name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run checks
        env:
          # The checked-in Cargo config uses native CPU tuning for local builds.
          # CI needs portable codegen: GitHub's runner can SIGILL during Clippy
          # when rustc is invoked with `-C target-cpu=native`.
          CARGO_ENCODED_RUSTFLAGS: ""
        run: just check
