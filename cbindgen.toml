language = "C"
include_guard = "LIBPAIRASSEMBLY_H"
include_version = true
usize_is_size_t = true
autogen_warning = "/* This file is generated by cbindgen. Do not edit by hand. */"

[parse]
parse_deps = false

[export]
item_types = ["enums", "structs", "typedefs", "opaque", "functions"]
include = [
  "PairasmAssembler",
  "PairasmBytes",
  "PairasmReadView",
  "PairasmMergedRead",
  "PairasmStatus",
  "pairasm_assembler_new",
  "pairasm_assembler_free",
  "pairasm_process_pair",
  "pairasm_merged_read_free",
  "pairasm_error_free",
]
